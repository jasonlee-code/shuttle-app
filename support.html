<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>문의사항 접수</title>

<style>
  body { margin: 0; background: #f8f9fa; font-family: -apple-system, sans-serif; padding: 20px; }
  .header { display: flex; align-items: center; margin-bottom: 25px; }
  .back-btn { background: none; border: none; font-size: 24px; cursor: pointer; margin-right: 15px; }
  .header h2 { font-size: 20px; margin: 0; font-weight: 700; }

  .form-container {
    background: white;
    border-radius: 20px;
    padding: 20px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.05);
  }

  .input-group { margin-bottom: 15px; }
  .input-group label { display: block; font-size: 14px; font-weight: 600; color: #666; margin-bottom: 6px; }

  .input-group input, .input-group textarea, .input-group select {
    width: 100%;
    padding: 12px 15px;
    border: 1.5px solid #eee;
    border-radius: 12px;
    font-size: 16px;
    box-sizing: border-box;
    outline: none;
    background-color: #fff;
    appearance: none; /* 기본 화살표 스타일 제거 */
  }

  .input-group input:focus, .input-group textarea:focus, .input-group select:focus {
    border-color: #667eea;
  }

  .submit-btn {
    width: 100%;
    height: 55px;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: white;
    border: none;
    border-radius: 15px;
    font-size: 18px;
    font-weight: 700;
    cursor: pointer;
    margin-top: 10px;
  }

  .submit-btn:disabled { background: #ccc; }
</style>
</head>
<body>

<div class="header">
  <button class="back-btn" onclick="history.back()">⬅</button>
  <h2>1:1 문의하기</h2>
</div>

<div class="form-container">
  <div class="input-group">
    <label>캠퍼스</label>
    <select id="campus">
      <option value="">캠퍼스를 선택하세요</option>
      <option value="일산캠퍼스">일산캠퍼스</option>
      <option value="정발캠퍼스">정발캠퍼스</option>
      <option value="일산엠폴리">일산엠폴리</option>
    </select>
  </div>

  <div class="input-group">
    <label>호차</label>
    <select id="busNo">
      <option value="">호차를 선택하세요</option>
      <option value="1호차">1호차</option>
      <option value="2호차">2호차</option>
      <option value="3호차">3호차</option>
      <option value="4호차">4호차</option>
      <option value="5호차">5호차</option>
      <option value="6호차">6호차</option>
      <option value="7호차">7호차</option>
      <option value="8호차">8호차</option>
      <option value="9호차">9호차</option>
      <option value="10호차">10호차</option>
    </select>
  </div>

  <div class="input-group">
    <label>문의 유형</label>
    <input type="text" id="type" placeholder="예: 노선 오차, 앱 오류 등">
  </div>

  <div class="input-group">
    <label>문의 내용</label>
    <textarea id="content" rows="5" placeholder="내용을 입력해주세요."></textarea>
  </div>

  <button class="submit-btn" id="submitBtn" onclick="sendInquiry()">문의 보내기</button>
</div>

<script>
async function sendInquiry() {
  const campus = document.getElementById('campus').value;
  const busNo = document.getElementById('busNo').value;
  const type = document.getElementById('type').value;
  const content = document.getElementById('content').value;
  const btn = document.getElementById('submitBtn');

  if (!campus || !busNo || !type || !content) {
    alert("모든 항목을 입력해주세요.");
    return;
  }

  btn.disabled = true;
  btn.innerText = "전송 중...";

  // 본인의 구글 웹 앱 URL
  const scriptURL = 'https://script.google.com/macros/s/AKfycbzEwqF6vq6Iy_0mdWD5hejwYG4fuVyZQLN7Jk92olsj2wgyO8rYkkwMIZAGXgtMX4A/exec'

  try {
    await fetch(scriptURL, {
      method: 'POST',
      mode: 'no-cors', 
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ 
        campus: campus, 
        busNo: busNo, 
        type: type, 
        content: content 
      })
    });
    
    alert("문의가 정상적으로 접수되었습니다!");
    location.href = 'index.html'; 
  } catch (error) {
    alert("전송 실패. 다시 시도해주세요.");
    btn.disabled = false;
    btn.innerText = "문의 보내기";
  }
}
</script>

</body>
</html>
