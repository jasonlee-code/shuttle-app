<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>메인</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<link rel="manifest" href="manifest.json">


<style>
body {
  margin: 0;
  background: #dfe3e8;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto;
}

/* 폰 프레임 */
.wrapper {
  width: 360px;
  height: 640px;
  margin: 40px auto;
  border-radius: 40px;
  background: linear-gradient(180deg, #f8f9fb, #e9ecf2);
  box-shadow: 0 20px 50px rgba(0,0,0,0.2);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 25px;
  padding: 20px;
  position: relative;
}

/* 상단 타이틀 */
.title {
  position: absolute;
  top: 30px;
  font-size: 20px;
  font-weight: bold;
}

/* 버튼 스타일 */
.btn {
  width: 260px;
  height: 80px;
  border-radius: 20px;
  background: white;
  box-shadow: 0 8px 20px rgba(0,0,0,0.1);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s ease;
}

/* 버튼 hover */
.btn:hover {
  transform: translateY(-5px);
  box-shadow: 0 12px 25px rgba(0,0,0,0.15);
}

/* 버튼 눌림 효과 */
.btn:active {
  transform: scale(0.97);
}

/* 버튼 색상 구분 */
.btn.dashboard {
  background: linear-gradient(135deg, #4facfe, #00f2fe);
  color: white;
}

.btn.bus {
  background: linear-gradient(135deg, #43e97b, #38f9d7);
  color: white;
}

.btn.route {
  background: linear-gradient(135deg, #fa709a, #fee140);
  color: white;
}
</style>

</head>
<body>

<div class="wrapper">

  <div class="title">셔틀 관리</div>

  <div class="btn dashboard" onclick="openDashboard()">📊 대시보드</div>
  <div class="btn bus" onclick="openBus()">🚌 버스관리</div>
  <div class="btn route" onclick="openRoute()">📍 노선추가</div>

</div>

<script>
function openDashboard() {
  location.href = 'dashboard.html';
}

function openBus() {
  window.open('bus.html', '_blank');
}

function openRoute() {
  window.open('route.html', '_blank');
}

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js')
    .then(() => console.log('SW 등록됨'));
}
</script>

</body>

</html>
