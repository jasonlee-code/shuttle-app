<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>학원 관리자 센터</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<style>
  :root {
    --bg-color: #f8f9fc;
    --card-bg: #ffffff;
    --text-main: #1a1a1a;
    --text-sub: #6e7191;
    --accent-admin: #5d5fef; /* 학원 관리자 포인트 블루 */
    --border-color: #f1f1f5;
  }

  body { 
    margin: 0; 
    background: var(--bg-color); 
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
    display: flex; 
    justify-content: center; 
  }

  .wrapper { 
    width: 100%; 
    max-width: 430px; 
    padding: 40px 20px; 
    box-sizing: border-box; 
    min-height: 100vh;
  }
  
  /* 상단 내비게이션 */
  .header { margin-bottom: 30px; position: relative; }
  .back-btn { 
    display: flex; 
    align-items: center; 
    color: var(--text-sub); 
    text-decoration: none; 
    font-size: 14px; 
    margin-bottom: 15px;
    font-weight: 600;
  }
  .header h1 { font-size: 26px; font-weight: 800; color: var(--text-main); margin: 0; }
  .header p { font-size: 14px; color: var(--text-sub); margin-top: 6px; }

  /* 아코디언 카드 디자인 */
  .accordion-item { 
    background: var(--card-bg); 
    border-radius: 24px; 
    margin-bottom: 16px; 
    box-shadow: 0 4px 15px rgba(0,0,0,0.04); 
    overflow: hidden; 
    border: 1px solid rgba(0,0,0,0.02);
    transition: all 0.3s ease;
  }
  
  .accordion-header { 
    padding: 24px; 
    display: flex; 
    align-items: center; 
    cursor: pointer; 
    position: relative; 
  }
  
  /* 포인트 라인 */
  .accordion-header::before { 
    content: ''; 
    position: absolute; 
    left: 0; 
    top: 0; 
    bottom: 0; 
    width: 6px; 
    background: var(--accent-admin); 
  }
  
  .icon-circle {
    width: 40px;
    height: 40px;
    background: #f0f2ff;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    margin-right: 16px;
  }

  .title-text { 
    font-size: 18px; 
    font-weight: 700; 
    color: var(--text-main); 
  }
  
  .arrow { 
    margin-left: auto; 
    width: 10px; 
    height: 10px; 
    border-right: 2.5px solid #d1d1d6; 
    border-bottom: 2.5px solid #d1d1d6; 
    transform: rotate(45deg); 
    transition: 0.3s; 
  }
  
  /* 활성화 상태 */
  .accordion-item.active {
    box-shadow: 0 10px 25px rgba(93, 95, 239, 0.1);
  }
  .accordion-item.active .arrow { transform: rotate(-135deg); }
  
  /* 서브 메뉴 리스트 */
  .accordion-content { 
    max-height: 0; 
    overflow: hidden; 
    transition: max-height 0.4s cubic-bezier(0.4, 0, 0.2, 1); 
    background: #fafbff; 
  }
  
  .accordion-item.active .accordion-content { 
    max-height: 500px; 
    border-top: 1px dashed var(--border-color); 
  }

  .sub-item { 
    padding: 18px 24px 18px 80px; /* 아이콘 위치 맞춰서 들여쓰기 */
    display: flex; 
    justify-content: space-between; 
    align-items: center; 
    text-decoration: none; 
    color: #4a4d71; 
    font-size: 15px; 
    font-weight: 600;
    border-bottom: 1px solid var(--border-color);
  }
  
  .sub-item:last-child { border-bottom: none; }
  .sub-item:active { background-color: #f0f2ff; }
  
  .sub-item::after {
    content: '❯';
    font-size: 12px;
    color: #d1d1d6;
  }

</style>
</head>
<body>

<div class="wrapper">
  <div class="header">
    <a href="index.html" class="back-btn">⇠ 메인 화면으로</a>
    <h1>학원 관리 센터</h1>
    <p>데이터 기반 셔틀 운영 및 관리</p>
  </div>

  <div class="accordion-item" onclick="toggleAccordion(this)">
    <div class="accordion-header">
      <div class="icon-circle">📢</div>
      <span class="title-text">공지사항 발송</span>
      <div class="arrow"></div>
    </div>
    <div class="accordion-content">
      <a href="#" class="sub-item">전체 공지사항 발송</a>
      <a href="#" class="sub-item">개별 학생 공지 발송</a>
    </div>
  </div>

  <div class="accordion-item" onclick="toggleAccordion(this)">
    <div class="accordion-header">
      <div class="icon-circle">🚌</div>
      <span class="title-text">셔틀 관리</span>
      <div class="arrow"></div>
    </div>
    <div class="accordion-content">
      <a href="#" class="sub-item">노선 관리</a>
      <a href="#" class="sub-item">셔틀 정보 (차량/기사)</a>
    </div>
  </div>

  <div class="accordion-item" onclick="toggleAccordion(this)">
    <div class="accordion-header">
      <div class="icon-circle">✅</div>
      <span class="title-text">출결 관리</span>
      <div class="arrow"></div>
    </div>
    <div class="accordion-content">
      <a href="#" class="sub-item">학생 실시간 출결 현황</a>
      <a href="#" class="sub-item">미탑승 학생 명단 확인</a>
    </div>
  </div>

  <div class="accordion-item" onclick="toggleAccordion(this)">
    <div class="accordion-header">
      <div class="icon-circle">⚙️</div>
      <span class="title-text">설정/관리</span>
      <div class="arrow"></div>
    </div>
    <div class="accordion-content">
      <a href="#" class="sub-item">셔틀 정보 수정 (차량/기사)</a>
      <a href="#" class="sub-item">관리자 계정 설정</a>
    </div>
  </div>

  <div class="accordion-item" onclick="toggleAccordion(this)">
    <div class="accordion-header">
      <div class="icon-circle">📈</div>
      <span class="title-text">노선 분석</span>
      <div class="arrow"></div>
    </div>
    <div class="accordion-content">
      <a href="#" class="sub-item">노선별 효율성 리포트</a>
      <a href="#" class="sub-item">정류장 혼잡도 분석</a>
    </div>
  </div>

</div>

<script>
  function toggleAccordion(element) {
    // 하나를 열면 나머지가 닫히는 효과 (원치 않으시면 이 블록을 삭제하세요)
    const items = document.querySelectorAll('.accordion-item');
    items.forEach(item => {
      if (item !== element) {
        item.classList.remove('active');
      }
    });

    // 클릭한 항목 토글
    element.classList.toggle('active');
  }
</script>

</body>
</html>
