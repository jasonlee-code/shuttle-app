<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Smart-Poly 안심 알리미</title>
  <style>
    :root { --w-b: #ff5252; --b-b: #4caf50; --special: #FF9800; --primary: #2196F3; }
    body { font-family: 'Pretendard', sans-serif; padding: 15px; background: #f4f7f6; max-width: 500px; margin: 0 auto; -webkit-tap-highlight-color: transparent; }
    h2 { text-align: center; margin-bottom: 20px; font-size: 1.4rem; color: #333; font-weight: 800; }
    .search-box { display: flex; gap: 8px; margin-bottom: 12px; }
    .search-box input { flex: 1; padding: 15px; border-radius: 12px; border: 2px solid #ddd; font-size: 1.1rem; outline: none; box-sizing: border-box; }
    .search-box button { padding: 0 20px; border-radius: 12px; border: none; background: var(--primary); color: white; font-weight: bold; cursor: pointer; }
    .mode-row { display: flex; gap: 10px; margin-bottom: 10px; }
    .mode-btn { flex: 1; padding: 12px; border-radius: 10px; border: 2px solid #eee; background: white; font-weight: bold; cursor: pointer; }
    .mode-btn.active { border-color: var(--primary); background: #e3f2fd; color: var(--primary); }
    .action-row { display: flex; gap: 10px; margin-bottom: 20px; align-items: center; }
    .action-row select { flex: 1; padding: 0 15px; border-radius: 12px; border: 2px solid #ddd; font-size: 1.1rem; font-weight: bold; background: white; outline: none; height: 54px; }
    .btn-special-link { flex: 1; height: 54px; border-radius: 12px; border: none; background: var(--special); color: white; font-weight: 800; font-size: 1rem; cursor: pointer; display: flex; align-items: center; justify-content: center; text-decoration: none; }
    .student { padding: 20px; margin-bottom: 12px; border-radius: 16px; display: flex; justify-content: space-between; align-items: center; background: white; box-shadow: 0 4px 10px rgba(0,0,0,0.06); border-left: 8px solid #ddd; cursor: pointer; }
    .student .name { font-size: 1.3rem; font-weight: 800; }
    .cat-tag { font-size: 0.85rem; color: #777; background: #f0f0f0; padding: 2px 8px; border-radius: 6px; margin-top: 4px; display: inline-block; }
    .status-badge { padding: 8px 15px; border-radius: 20px; font-weight: 800; font-size: 0.95rem; color: white; }
    .waiting { border-left-color: var(--w-b); } .waiting .status-badge { background: var(--w-b); }
    .boarded { border-left-color: var(--b-b); background: #f1fbf1; } .boarded .status-badge { background: var(--b-b); }
    .special-status { border-left-color: var(--special); background: #fff8e1; } .special-status .status-badge { background: var(--special); }
    .placeholder-msg { text-align: center; color: #888; margin-top: 50px; line-height: 1.6; }
    .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; justify-content: center; align-items: center; }
    .modal-content { background: white; padding: 25px; border-radius: 20px; width: 85%; max-width: 350px; text-align: center; }
    .modal-btn { width: 100%; padding: 15px; margin-bottom: 10px; border: none; border-radius: 12px; font-size: 1.1rem; font-weight: bold; cursor: pointer; }
  </style>
</head>
<body>

<div class="top-nav">
<button class="btn btn-primary fw-bold" onclick="window.open('https://docs.google.com/spreadsheets/d/1Y276IF0wsiA06CXy8WVOW8UpCjaRJenSdg7BYe3wDy0/edit?gid=2000086756#gid=2000086756')">📊 데이터 관리 센터 이동</button>

<br>    <a href="index.html" class="back-btn">⇠ 메인 화면으로</a>

<h2>🚐 Smart-Poly 안심 알리미</h2>

<div class="search-box">
  <input type="text" id="searchInput" placeholder="아이 이름을 입력하세요" onkeyup="if(event.keyCode==13) renderList()">
  <button onclick="renderList()">찾기</button>
</div>

<div class="mode-row">
  <button id="btnIn" class="mode-btn active" onclick="setMode('등원')">🏠 등원 확인</button>
  <button id="btnOut" class="mode-btn" onclick="setMode('하원')">🚌 하원 확인</button>
</div>

<div class="action-row">
  <select id="routeSelect" onchange="renderList()">
    <option value="">호차 로딩중...</option>
  </select>
  <button class="btn-special-link" onclick="openSpecialForm()">📝 특이사항 알림</button>
</div>

<div id="list"><div class="placeholder-msg">정보 보호를 위해<br><b>아이 이름을 입력 후 찾기</b>를 눌러주세요.</div></div>

<div id="statusModal" class="modal">
  <div class="modal-content">
    <h3 id="modalTargetName" style="margin-bottom:20px;">학생 상태 변경</h3>
    <div id="inModeButtons">
      <button class="modal-btn" style="background:var(--special); color:white;" onclick="updateSpecial('개별등원')">1. 개별등원</button>
      <button class="modal-btn" style="background:#f44336; color:white;" onclick="updateSpecial('결석')">2. 결석</button>
    </div>
    <div id="outModeButtons" style="display:none;">
      <button class="modal-btn" style="background:var(--special); color:white;" onclick="updateSpecial('개별하원')">1. 개별하원</button>
    </div>
    <button class="modal-btn" style="background:#eee;" onclick="closeModal()">닫기</button>
  </div>
</div>

<script>
// 배포한 새 주소를 아래에 넣으세요
const API_URL = "https://script.google.com/macros/s/AKfycbxJ5uqtJk1iGrA57m0ap4hyJgJ5aAN67OV0_xFXAKmdc4aY-PS7Wm5g8z_QDsRMHYFjDA/exec";
const specialFormUrl = "https://docs.google.com/forms/d/e/1FAIpQLSdQXa5Lo30iMufm9KHt_RpH6y5GxSaCXUgXLwRdtbm8Q0ukDw/viewform";

let students = [];
let busList = [];
let selectedStudent = null;
let currentMode = "등원";

async function loadData() {
  try {
    const res = await fetch(`${API_URL}?t=${Date.now()}`);
    const result = await res.json();
    students = result.students || [];
    busList = result.busStatus || [];
    
    updateBusSelect(); // 호차 목록 업데이트
    if (document.getElementById("searchInput").value.trim()) renderList();
  } catch (e) { console.error("데이터 로드 실패", e); }
}

// 호차 셀렉트 박스 동적 생성
function updateBusSelect() {
  const select = document.getElementById("routeSelect");
  const currentValue = select.value;
  select.innerHTML = "";

  // 호차 이름순 정렬
  busList.sort((a, b) => {
    const numA = parseInt(a.name.replace(/[^0-9]/g, "")) || 0;
    const numB = parseInt(b.name.replace(/[^0-9]/g, "")) || 0;
    return numA - numB;
  });

  busList.forEach(bus => {
    const opt = document.createElement("option");
    opt.value = bus.name;
    opt.innerText = bus.name;
    if(bus.name === currentValue) opt.selected = true;
    select.appendChild(opt);
  });
}

function setMode(mode) {
  currentMode = mode;
  document.getElementById('btnIn').classList.toggle('active', mode === '등원');
  document.getElementById('btnOut').classList.toggle('active', mode === '하원');
  document.getElementById('inModeButtons').style.display = (mode === '등원') ? 'block' : 'none';
  document.getElementById('outModeButtons').style.display = (mode === '하원') ? 'block' : 'none';
  renderList();
}

function renderList() {
  const list = document.getElementById("list");
  const select = document.getElementById("routeSelect");
  const selectedBus = select.value ? select.value.replace(/[^0-9]/g, "").trim() : "";
  const search = document.getElementById("searchInput").value.trim();

  if (!search) {
    list.innerHTML = `<div class="placeholder-msg">아이 이름을 입력해야 정보를 확인할 수 있습니다.</div>`;
    return;
  }

  list.innerHTML = "";
  
  let filtered = students.filter(s => {
    // 하원 필드명 bus, dBus 둘 다 대응
    const targetBusRaw = (currentMode === "등원") ? s.pBus : (s.bus || s.dBus);
    const targetBus = String(targetBusRaw || "");
    const busMatch = targetBus.includes(selectedBus);
    const nameMatch = s.name.replace(/\s+/g, '').includes(search.replace(/\s+/g, ''));
    return busMatch && nameMatch;
  });

  if (filtered.length === 0) {
    list.innerHTML = `<div class="placeholder-msg">해당 호차에 검색된 결과가 없습니다.</div>`;
    return;
  }

  filtered.forEach((s) => {
    const div = document.createElement("div");
    const st = (currentMode === "등원") ? (s.inStatus || '미탑승') : (s.outStatus || '미탑승');
    let statusClass = (st === '탑승') ? 'boarded' : (['개별등원', '개별하원', '결석'].includes(st) ? 'special-status' : 'waiting');
    let displayStatus = (st === '탑승') ? (currentMode === "등원" ? '등원완료' : '하원완료') : st;
    
    div.className = `student ${statusClass}`;
    div.onclick = () => {
      selectedStudent = s.name;
      document.getElementById("modalTargetName").innerText = s.name + " 학생";
      document.getElementById("statusModal").style.display = "flex";
    };
    
    div.innerHTML = `
      <div class="info">
        <span class="name">${s.name}</span><br>
        <span class="cat-tag">${s.category || '학생'}</span>
      </div>
      <div class="status-badge">${displayStatus}</div>
    `;
    list.appendChild(div);
  });
}

async function updateSpecial(status) {
  if(!confirm(`'${selectedStudent}' 학생을 [${status}] 상태로 변경할까요?`)) return;
  
  const idx = students.findIndex(s => s.name === selectedStudent);
  if(idx > -1) {
    if(currentMode === "등원") students[idx].inStatus = status;
    else students[idx].outStatus = status;
  }
  renderList();
  closeModal();

  fetch(API_URL, {
    method: 'POST',
    mode: 'no-cors',
    body: JSON.stringify({ action: 'updateStatus', name: selectedStudent, status: status, type: currentMode })
  });
}

function closeModal() { document.getElementById("statusModal").style.display = "none"; }
function openSpecialForm() { window.open(specialFormUrl, '_blank'); }

// 10초마다 자동 새로고침 (데이터 동기화)
setInterval(loadData, 10000);
loadData();
</script>
</body>
</html>
